<!DOCTYPE html>
<html>
<head>
<title>Task 06 - Basic Form Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<div class="w3-container w3-margin-top" style="max-width: 400px; margin: auto;">
  
  <form class="w3-container w3-border w3-padding-16">
    <h2>Login</h2>
    <p>Please, Register or Login to our site first !</p>
    
    <p>
      <label><b>User ID</b></label>
      <input class="w3-input w3-border" type="text" placeholder="">
    </p>
    
    <p>
      <label><b>Passcode</b></label>
      <input class="w3-input w3-border" type="password" placeholder="">
    </p>
    
    <p>
      <button type="button" class="w3-button w3-green">Signin</button>
    </p>
  </form>

</div>

</body>
</html>
